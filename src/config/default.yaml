# Default domain configuration for the review system.
# This is domain-agnostic. For domain-specific overrides,
# create additional YAML files (e.g., biomedical.yaml).

# 材料语域：供 extract_facts_by_chunk、build_dimensions_from_facts 等共用，避免 prompts 与配置漂移
material_domain_zh: |
  各类商业项目评审材料（投融资计划书、可行性研究、招标与响应文件、公司介绍、备忘录等），行业不限。
  中文或以中文为主、中英混排较为常见；若为纯外文、临床方案、科研课题等，仅以原文为准，勿套用未出现的商业要素。

fallback_dimension: feasibility

dimensions:
  - name: team
    label_zh: "团队与治理"
    label_en: "Team & Governance"
    description: "Team composition, individual backgrounds, institutional affiliations, roles, collaboration"
    focus_zh: "通用评审骨架：执行主体是否清晰；关键角色能力与分工；治理与外部协作是否支撑披露目标（以材料为准，不预设行业）。"
    focus_en: "Team composition, leadership experience, collaboration network, stability"
    min_questions: 6
    max_questions: 9
    weight: 1.0
    aspects:
      - id: leadership_experience
        desc_zh: "牵头人/负责人对同类或同规模任务的执行记录与可核验证据（材料已披露部分）"
        desc_en: "Project leader's leadership experience and track record"
      - id: domain_expertise
        desc_zh: "团队能力与任务范围的匹配度：知识深度、资质与关键技能覆盖（材料已披露部分）"
        desc_en: "Team's domain expertise depth"
      - id: collaboration_network
        desc_zh: "外部协作与关键依赖：合作方角色、互补性与集中度风险（材料已披露部分）"
        desc_en: "Collaboration network and complementarity"
      - id: governance_and_decision_making
        desc_zh: "治理与决策：分工授权、决策链、质量与合规内控安排（材料已披露部分）"
        desc_en: "Governance structure, decision-making, quality control"
      - id: team_capacity_and_bandwidth
        desc_zh: "投入与承载：人力/时间/管理带宽与阶段目标的匹配（材料已披露部分）"
        desc_en: "Team capacity and resource commitment"

  - name: objectives
    label_zh: "项目目标"
    label_en: "Objectives"
    description: "Overall goals, milestones, KPIs, sub-project targets"
    focus_zh: "通用评审骨架：目标是否可检验；阶段结果与成功判据；范围边界与优先级；与约束条件的自洽性（以材料为准）。"
    focus_en: "Goal clarity, milestones, measurable metrics, achievability"
    min_questions: 6
    max_questions: 9
    weight: 1.0
    aspects:
      - id: overall_goal_clarity
        desc_zh: "总体目标陈述是否明确、可界定成功/失败（材料已披露部分）"
      - id: milestones_and_timeline
        desc_zh: "阶段划分与时间节点是否具体、可执行与可检查（材料已披露部分）"
      - id: outcome_and_success_metrics
        desc_zh: "成功判据与测度：指标、口径与证据来源是否交代清楚（材料已披露部分）"
      - id: scope_and_prioritization
        desc_zh: "范围边界与不做什么；资源约束下的优先级取舍（材料已披露部分）"
      - id: realism_and_ambition_balance
        desc_zh: "目标强度与可得资源、外部环境之间的一致性（材料已披露部分）"

  - name: strategy
    label_zh: "实施路径与战略"
    label_en: "Strategy"
    description: "Technical approach, development path, market strategy, partnerships, operations"
    focus_zh: "通用评审骨架：主路径与备选；对外价值实现与关键接口；合作与资源编排；证据与合规边界（以材料为准，不预设单一业态）。"
    focus_en: "Technical approach, market entry, partnership strategy, resource utilization"
    min_questions: 7
    max_questions: 10
    weight: 1.0
    aspects:
      - id: technical_strategy
        desc_zh: "主方案与备选方案：方法选择、关键假设与依赖（材料已披露部分）"
      - id: commercialization_and_market_entry
        desc_zh: "价值到达路径：客户/用户/采购或付费关系、渠道与交付形态（材料已披露部分；无则评信息缺口）"
      - id: partnership_and_business_model
        desc_zh: "合作与交易结构：权责、收益分配、排他与退出（材料已披露部分）"
      - id: data_and_evidence_strategy
        desc_zh: "关键结论所依赖的数据、来源、留存与合规/保密边界（材料已披露部分）"
      - id: scaling_and_globalization
        desc_zh: "扩张或跨区域/跨场景推广的前提、节奏与约束（材料已披露部分）"

  - name: innovation
    label_zh: "技术与产品创新"
    label_en: "Innovation"
    description: "Novelty, differentiation, IP, evidence strength, extensibility"
    focus_zh: "通用评审骨架：相对基准的差异；可辩护优势；保护与证据链；可扩展边界与外部替代风险（以材料为准）。"
    focus_en: "Novelty vs state of art, differentiation, IP protection, evidence strength"
    min_questions: 6
    max_questions: 9
    weight: 1.10
    aspects:
      - id: novelty_vs_state_of_art
        desc_zh: "相对行业/惯例或对标基准的实质性差异点（材料已披露部分）"
      - id: differentiation_and_competitive_edge
        desc_zh: "可辩护的差异化要点及与替代方案的关系（材料已披露部分）"
      - id: ip_and_protection
        desc_zh: "可保护知识与合规资产：权利、合同安排、排他或关键 know-how（材料已披露部分）"
      - id: evidence_strength_for_innovation
        desc_zh: "主张的支撑强度：验证设计、样本、独立性与可复核性（材料已披露部分）"
      - id: platform_and_extensibility
        desc_zh: "方案的复用边界、接口与生态位：是否具备可扩展结构（材料已披露部分）"
      - id: risk_of_obsolescence
        desc_zh: "外部变化下被替代、淘汰或规则变化的主要风险与窗口（材料已披露部分）"

  - name: feasibility
    label_zh: "资源与可行性"
    label_en: "Feasibility"
    description: "Resources, budget, implementation path, risks, timeline"
    focus_zh: "通用评审骨架：资源与预算；执行编排；风险与缓解；关键障碍与时间—投入节拍（以材料为准）。"
    focus_en: "Resources, funding, implementation path, risk management, timeline feasibility"
    min_questions: 7
    max_questions: 10
    weight: 1.20
    aspects:
      - id: resources_and_infrastructure
        desc_zh: "关键资源与基础设施的可得性、独占性与持续性（材料已披露部分）"
      - id: funding_and_budget_planning
        desc_zh: "资金与预算结构：来源、用途、集中度与缓冲（材料已披露部分）"
      - id: operational_execution_plan
        desc_zh: "从计划到落地的步骤、责任主体与关键路径（材料已披露部分）"
      - id: risk_management
        desc_zh: "主要风险与监测指标；缓解与预案是否对应（材料已披露部分）"
      - id: implementation_barriers
        desc_zh: "实施障碍：监管、供应链、组织、数据或外部依赖等（材料已披露部分）"
      - id: timeline_and_resource_alignment
        desc_zh: "时间表与投入节拍、里程碑与资源曲线是否自洽（材料已披露部分）"

fact_types:
  - name: team_member
    description: "Member identity, institution, role"
    mapped_dimensions: [team]
  - name: org_structure
    description: "Team/org structure, division of labor"
    mapped_dimensions: [team]
  - name: collaboration
    description: "Partnerships, cross-institutional cooperation"
    mapped_dimensions: [team, strategy]
  - name: resource
    description: "Lab, platform, data, partnership resources"
    mapped_dimensions: [feasibility]
  - name: pipeline
    description: "Project/sub-project goals, technical approach"
    mapped_dimensions: [objectives, strategy]
  - name: milestone
    description: "Phase-specific tasks, timelines"
    mapped_dimensions: [objectives, feasibility]
  - name: market
    description: "Market size, CAGR, competition, customers"
    mapped_dimensions: [objectives, strategy, feasibility]
  - name: tech_route
    description: "Technical/algorithmic/experimental approach"
    mapped_dimensions: [strategy, feasibility]
  - name: product
    description: "Product/platform form, business model"
    mapped_dimensions: [objectives, strategy, feasibility]
  - name: ip_asset
    description: "Patents, proprietary technology, unique data"
    mapped_dimensions: [innovation, feasibility]
  - name: evidence
    description: "Experimental/validation data and conclusions"
    mapped_dimensions: [innovation, feasibility]
  - name: budget_item
    description: "Budget amounts or cost breakdown"
    mapped_dimensions: [feasibility]
  - name: funding_source
    description: "Funding sources (VC, grants, self-funded)"
    mapped_dimensions: [strategy, feasibility]
  - name: risk
    description: "Technical/market/regulatory risks or uncertainties"
    mapped_dimensions: [feasibility]
  - name: mitigation
    description: "Risk countermeasures or mitigation strategies"
    mapped_dimensions: [feasibility]
  - name: ai_model
    description: "Specific AI model/algorithm/architecture"
    mapped_dimensions: [innovation, strategy]
  - name: regulatory
    description: "Regulatory pathway, approval strategy"
    mapped_dimensions: [strategy, feasibility]
  - name: other
    description: "Other relevant facts"
    mapped_dimensions: []
